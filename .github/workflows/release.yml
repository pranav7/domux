name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${GITHUB_REF_NAME}"
          VERSION_BODY="${VERSION#v}"
          OUTDIR="dist/${GOOS}_${GOARCH}"
          mkdir -p "$OUTDIR"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$OUTDIR/domux" .
          tar -czf "dist/domux_${VERSION_BODY}_${GOOS}_${GOARCH}.tar.gz" -C "$OUTDIR" domux
          shasum -a 256 "dist/domux_${VERSION_BODY}_${GOOS}_${GOARCH}.tar.gz" \
            | sed "s| dist/| |" > "dist/domux_${VERSION_BODY}_${GOOS}_${GOARCH}.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: domux-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/domux_*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: domux-*
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          cd dist
          cat *.sha256 > SHA256SUMS
          rm -f *.sha256

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --generate-notes \
            dist/domux_*.tar.gz dist/SHA256SUMS
